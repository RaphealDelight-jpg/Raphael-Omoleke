<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍳 Cooking Fever</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Baloo 2',cursive;background:linear-gradient(160deg,#ff9a3c,#ff6b3d,#d63031);min-height:100vh;overflow:hidden;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#0004;}
.hud-item{color:#fff;text-align:center;}
.hud-item span{display:block;font-size:1.5rem;font-weight:800;}
.hud-item small{font-size:.7rem;opacity:.8;}
#timer-bar{height:8px;background:#fff3;margin:0 20px 0;}
#timer-fill{height:100%;background:linear-gradient(90deg,#55efc4,#00b894);border-radius:4px;transition:width .5s linear;}
#restaurant{display:flex;height:calc(100vh - 80px);position:relative;}
#customer-lane{width:160px;padding:10px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.customer{background:#fff2;border-radius:16px;padding:10px;text-align:center;position:relative;cursor:pointer;transition:.2s;}
.customer:hover{background:#fff4;}
.customer .avatar{font-size:2rem;}
.customer .want{font-size:1.3rem;}
.customer .patience{height:5px;background:#fff3;border-radius:3px;margin-top:6px;overflow:hidden;}
.customer .pat-fill{height:100%;background:#55efc4;border-radius:3px;transition:width .1s;}
.customer.angry .pat-fill{background:#d63031;}
.customer.served{animation:zoomOut .4s forwards;}
@keyframes zoomOut{to{transform:scale(0);opacity:0;}}
#kitchen{flex:1;padding:14px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:12px;}
.station{background:#fff2;border-radius:18px;padding:14px;text-align:center;cursor:pointer;transition:.2s;position:relative;border:3px solid transparent;}
.station:hover{background:#fff3;border-color:#fff5;}
.station.active{border-color:#55efc4;box-shadow:0 0 20px #55efc455;}
.station .icon{font-size:2.8rem;margin-bottom:6px;}
.station .name{color:#fff;font-size:.85rem;font-weight:700;}
.station .progress{height:8px;background:#0003;border-radius:4px;margin-top:8px;overflow:hidden;}
.station .prog-fill{height:100%;background:linear-gradient(90deg,#fdcb6e,#f9ca24);border-radius:4px;transition:width .3s;}
.station .item-ready{font-size:1.4rem;position:absolute;top:8px;right:10px;animation:bounce .5s infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-6px);}}
#tray{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#fff2;border-radius:20px;padding:10px 20px;display:flex;gap:10px;min-width:200px;min-height:60px;align-items:center;justify-content:center;border:3px dashed #fff5;}
#tray-label{color:#fff9;font-size:.8rem;position:absolute;top:-22px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.tray-item{font-size:1.8rem;animation:pop .2s;}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
#levelup{position:fixed;top:0;left:0;right:0;bottom:0;background:#0008;display:none;align-items:center;justify-content:center;z-index:99;}
#levelup.show{display:flex;}
#levelup-box{background:linear-gradient(135deg,#ff9a3c,#ff6b3d);border-radius:28px;padding:40px;text-align:center;color:#fff;}
#levelup-box h2{font-size:2.5rem;font-weight:800;}
#levelup-box p{font-size:1.1rem;margin:10px 0 20px;}
#nextbtn{padding:12px 32px;background:#fff;color:#ff6b3d;border:none;border-radius:20px;font-size:1.1rem;font-weight:800;cursor:pointer;font-family:'Baloo 2';}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-item"><small>LEVEL</small><span id="lvl">1</span></div>
  <div class="hud-item"><small>SCORE</small><span id="score">0</span></div>
  <div class="hud-item"><small>⭐ TARGET</small><span id="target">200</span></div>
  <div class="hud-item"><small>SERVED</small><span id="served">0</span></div>
</div>
<div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>
<div id="restaurant">
  <div id="customer-lane"></div>
  <div id="kitchen">
    <!-- stations generated by JS -->
  </div>
  <div id="tray"><span id="tray-label">Your Tray (click customer to serve)</span></div>
</div>
<div id="levelup" id="levelup">
  <div id="levelup-box">
    <h2>🎉 Level Complete!</h2>
    <p id="lvl-summary"></p>
    <button id="nextbtn" onclick="nextLevel()">Next Level 🍳</button>
  </div>
</div>

<script>
const MENUS=[
  {name:'🍔 Burger',emoji:'🍔',time:4000},
  {name:'🍕 Pizza',emoji:'🍕',time:6000},
  {name:'🌮 Taco',emoji:'🌮',time:3000},
  {name:'🍜 Noodles',emoji:'🍜',time:5000},
  {name:'🍱 Bento',emoji:'🍱',time:7000},
  {name:'🍣 Sushi',emoji:'🍣',time:5000},
  {name:'🌭 Hotdog',emoji:'🌭',time:2500},
  {name:'🥪 Sandwich',emoji:'🥪',time:3500},
  {name:'🍛 Curry',emoji:'🍛',time:6500},
  {name:'🥗 Salad',emoji:'🥗',time:2000},
];
const STATIONS=[
  {name:'Grill 🔥',produces:'🍔',emoji:'🥩'},
  {name:'Oven 🫓',produces:'🍕',emoji:'🫓'},
  {name:'Fryer 🍟',produces:'🌮',emoji:'🫕'},
  {name:'Wok 🥢',produces:'🍜',emoji:'🥢'},
  {name:'Sushi Bar 🐟',produces:'🍣',emoji:'🐟'},
  {name:'Grill 2 🌭',produces:'🌭',emoji:'🌭'},
];

let lvl=1,score=0,served=0,tray=[],gameTimer=null,customerTimer=null;
let stationStates=[],customers=[],gameActive=false;
let levelTime=60,timeLeft=60,lastTick=null;

function getLevelConfig(){
  return{
    time:Math.min(120,60+lvl*5),
    target:(lvl*150),
    stationCount:Math.min(6,3+Math.floor(lvl/2)),
    maxCustomers:Math.min(5,2+Math.floor(lvl/3)),
    spawnRate:Math.max(3000,7000-lvl*300),
    patience:Math.max(8000,15000-lvl*500),
  };
}

function startGame(){
  const cfg=getLevelConfig();
  levelTime=cfg.time;timeLeft=cfg.time;
  score=0;served=0;tray=[];customers=[];
  stationStates=[];
  document.getElementById('lvl').innerText=lvl;
  document.getElementById('score').innerText=0;
  document.getElementById('target').innerText=cfg.target;
  document.getElementById('served').innerText=0;
  document.getElementById('levelup').classList.remove('show');
  buildKitchen(cfg.stationCount);
  renderTray();
  gameActive=true;
  lastTick=performance.now();
  requestAnimationFrame(tick);
  spawnCustomer(cfg);
}

function buildKitchen(n){
  const k=document.getElementById('kitchen');
  k.innerHTML='';
  stationStates=[];
  for(let i=0;i<n;i++){
    const s=STATIONS[i%STATIONS.length];
    const div=document.createElement('div');
    div.className='station';
    div.innerHTML=`<div class="icon">${s.emoji}</div><div class="name">${s.name}</div><div class="progress"><div class="prog-fill" id="prog${i}" style="width:0%"></div></div>`;
    div.onclick=()=>clickStation(i);
    k.appendChild(div);
    stationStates.push({...s,cooking:false,progress:0,ready:false});
  }
}

function clickStation(i){
  if(!gameActive)return;
  const st=stationStates[i];
  if(st.ready){
    // pick up
    tray.push(st.produces);
    st.ready=false;st.cooking=false;st.progress=0;
    renderStation(i);renderTray();
    return;
  }
  if(!st.cooking){
    st.cooking=true;st.progress=0;
    renderStation(i);
  }
}

function renderStation(i){
  const st=stationStates[i];
  const div=document.getElementById('kitchen').children[i];
  if(!div)return;
  div.classList.toggle('active',st.cooking||st.ready);
  const pf=document.getElementById('prog'+i);
  if(pf)pf.style.width=(st.progress*100)+'%';
  // ready badge
  let badge=div.querySelector('.item-ready');
  if(st.ready&&!badge){badge=document.createElement('div');badge.className='item-ready';badge.innerText=st.produces;div.appendChild(badge);}
  else if(!st.ready&&badge)badge.remove();
}

function renderTray(){
  const t=document.getElementById('tray');
  t.innerHTML='<span id="tray-label">Tray — click customer to serve</span>';
  tray.forEach(item=>{const s=document.createElement('span');s.className='tray-item';s.innerText=item;t.appendChild(s);});
}

let spawnTimeout=null;
function spawnCustomer(cfg){
  if(!gameActive)return;
  if(customers.filter(c=>!c.served).length<cfg.maxCustomers){
    const menu=MENUS[Math.floor(Math.random()*Math.min(MENUS.length,3+lvl))];
    customers.push({id:Date.now(),want:menu.emoji,name:menu.name,patience:cfg.patience,maxPat:cfg.patience,served:false,angry:false});
    renderCustomers(cfg);
  }
  spawnTimeout=setTimeout(()=>spawnCustomer(cfg),cfg.spawnRate+Math.random()*2000);
}

function renderCustomers(cfg){
  const lane=document.getElementById('customer-lane');
  lane.innerHTML='';
  customers.filter(c=>!c.served).slice(0,cfg.maxCustomers).forEach(c=>{
    const div=document.createElement('div');
    div.className='customer'+(c.angry?' angry':'');
    div.innerHTML=`<div class="avatar">${['😊','🤩','😄','🥰'][Math.floor(Math.random()*4)]}</div><div class="want">${c.want}</div><div class="patience"><div class="pat-fill" id="pat${c.id}" style="width:${(c.patience/c.maxPat)*100}%"></div></div>`;
    div.onclick=()=>serveCustomer(c,cfg);
    lane.appendChild(div);
  });
}

function serveCustomer(c,cfg){
  if(!gameActive||c.served)return;
  const idx=tray.indexOf(c.want);
  if(idx===-1){
    // wrong item shake
    return;
  }
  tray.splice(idx,1);
  c.served=true;
  const bonus=Math.ceil((c.patience/c.maxPat)*50);
  const pts=100+bonus;
  score+=pts;served++;
  document.getElementById('score').innerText=score;
  document.getElementById('served').innerText=served;
  renderTray();
  renderCustomers(cfg);
  // remove served
  customers=customers.filter(cu=>!cu.served);
}

function tick(now){
  if(!gameActive)return;
  const dt=(now-lastTick)/1000;lastTick=now;
  timeLeft=Math.max(0,timeLeft-dt);
  document.getElementById('timer-fill').style.width=(timeLeft/levelTime*100)+'%';
  const cfg=getLevelConfig();
  // update stations
  stationStates.forEach((st,i)=>{
    if(st.cooking&&!st.ready){
      const cookTime=(MENUS.find(m=>m.emoji===st.produces)||{time:4000}).time/1000;
      st.progress=Math.min(1,st.progress+dt/cookTime);
      if(st.progress>=1){st.ready=true;st.cooking=false;}
      renderStation(i);
    }
  });
  // update customer patience
  customers.forEach(c=>{
    c.patience=Math.max(0,c.patience-dt*1000);
    c.angry=c.patience<c.maxPat*0.3;
    const pf=document.getElementById('pat'+c.id);
    if(pf)pf.style.width=(c.patience/c.maxPat*100)+'%';
    if(c.patience<=0&&!c.served){c.served=true;customers=customers.filter(cu=>cu!==c);renderCustomers(cfg);}
  });
  if(timeLeft<=0){endLevel();return;}
  requestAnimationFrame(tick);
}

function endLevel(){
  gameActive=false;
  clearTimeout(spawnTimeout);
  const cfg=getLevelConfig();
  const passed=score>=cfg.target;
  document.getElementById('lvl-summary').innerText=passed?`Score: ${score} / ${cfg.target} — Amazing! 🌟`:`Score: ${score} / ${cfg.target} — So close! Try again!`;
  document.getElementById('levelup').classList.add('show');
  if(!passed)document.getElementById('nextbtn').innerText='Try Again 🍳';
  else document.getElementById('nextbtn').innerText='Next Level 🍳';
  if(!passed)document.getElementById('nextbtn').onclick=()=>startGame();
  else document.getElementById('nextbtn').onclick=()=>nextLevel();
}

function nextLevel(){lvl++;startGame();}

startGame();
</script>
</body>
</html>
