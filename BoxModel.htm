<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model on HTML</title>
    <style>
         div {
            width:300px;
            height: 150px;
            border: 10px solid black;
            padding: 20px;
            margin: 15px;
            background-color: lightblue;
         }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height:100vh;
            margin:0;
            background-color: lightgray;
            background-attachment: fixed;
        }
        h1 {
            text-align: center;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            color:darkblue;

        }

    </style>
</head>
<body>
    <h1>Box Model Example</h1>
    <div>
        this is a box model Example
    </div>
    <p>The box model consists of maargins,borders,padding and the actual content. the content is surrounded by padding,the padding is surrounded by borders and the borders are surrounded by margins.</p>
                                                                          
</body>
</html>
