<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expression Functions</title>
</head>
<body>
    <center>
        <h1 style="color: green;">Expression Functions</h1>
        <p>An expression function is a concise way to write functions in JavaScript using arrow syntax.</p>
        <p>Here is an example of an expression function that adds two numbers:</p>
        <h3 style="color: blue;">function Declaration</h3>
        <script>

            var result = function (a,b) {
                return a * b;
            }(5, 10);
            document.write("The result of multiplying 5 and 10 is: " + result);
        </script>
    </center>
</body>
</html>
