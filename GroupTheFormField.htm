<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group The Form Field</title>
</head>
<body>
   <form>
      <fieldset>
            <!-- fieldset tag is used to group related element in a form
             and draws a box around them-->
             <legend>personal information:</legend>
             <label>Full name:</label>
             <!--placeholder attribute can be used to provide extra
              information about entry to be mede-->
              <input type="text" id="fname" placeholder="enter name"><br><br>
              <label>email:</label>
              <input type="text" id="email"><br><br>
              <label>Gender:</label>
              <input type="radio" id="Gender" value="female">female<br><br>
              <input type="radio" id="Gender" value="male">male<br><br>
              <label>Birthday:</label>
              <input type="date" id="Birthday" name="birthday"><br><br>
      </fieldset>
   </form>  
</body>
</html>
