<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Statements</title>
</head>
<body>
    <h3>Conditional Statements</h3>
    <p>Conditional statements are used to perform different actions based on different conditions. The most common conditional statements are:</p>
          <button onclick="checkTime()">Check Time and Greet</button>
          <p id="hour"></p>
    <p id="greet"></p>
    <script>
        function checkTime() {
            var today = new Date();
            var hour = today.getHours();
            document.getElementById("hour").innerHTML = "Current Hour: " + hour;

            var greeting;
            if (hour < 12) {
                greeting = "Good morning!";
            } else if (hour < 18) {
                greeting = "Good afternoon!";
            } else {
                greeting = "Good evening!";
            }
            document.getElementById("greet").innerHTML = greeting;
        }
    </script>
</body>
</html>
