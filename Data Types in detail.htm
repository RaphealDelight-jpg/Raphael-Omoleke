<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types in Detail</title>
</head>
<body>
    <H2>Data Types in Detail</H2>
    <p>In programming, data types are used to define the type of data that can be stored and manipulated within a program. Common data types include:</p>
    <script>
        var a = 10; // Integer
        var b = 15.5; // Float
        var c = "Hello, World!"; // String
        var d = true; // Boolean
        var e = [1, 2, 3, 4, 5]; // Array
        document.write("<ul>");
        document.write("<li>Integer: " + a + "</li>");
        document.write("<li>Float: " + b + "</li>");
        document.write("<li>String: " + c + "</li>");
        document.write("<li>Boolean: " + d + "</li>");
        document.write("<li>Array: " + e + "</li>");
    </script>
</body>
</html>
