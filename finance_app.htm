<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#06030f;color:#e8e0ff;font-family:'Rajdhani',sans-serif;padding:20px;}
  h1{font-family:'Orbitron',monospace;font-size:18px;color:#a78bfa;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;}
  .subtitle{color:#6b5ca5;font-size:13px;letter-spacing:2px;margin-bottom:20px;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab{padding:8px 18px;border:1px solid #a78bfa33;border-radius:4px;cursor:pointer;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:#8877cc;transition:all .2s;}
  .tab.active{background:#1a0a33;border-color:#a78bfa;color:#a78bfa;}
  .panel{background:#0c0618;border:1px solid #a78bfa22;border-radius:6px;padding:16px;margin-bottom:16px;}
  .panel-title{font-family:'Orbitron',monospace;font-size:11px;color:#a78bfa88;letter-spacing:2px;margin-bottom:12px;}
  .sub-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#100820;border:1px solid #a78bfa11;border-radius:4px;margin-bottom:8px;}
  .sub-icon{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .sub-name{flex:1;font-size:14px;font-weight:600;color:#d4c8ff;}
  .sub-cost{font-family:'Share Tech Mono',monospace;font-size:15px;color:#a78bfa;}
  .sub-freq{font-size:11px;color:#6b5ca5;display:block;}
  .sub-del{background:none;border:none;color:#ff4444;cursor:pointer;font-size:16px;padding:4px 8px;opacity:.5;transition:.2s;}
  .sub-del:hover{opacity:1;}
  .total-bar{background:#1a0a33;border:1px solid #a78bfa44;border-radius:6px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .total-label{font-size:13px;color:#8877cc;letter-spacing:1px;}
  .total-val{font-family:'Orbitron',monospace;font-size:22px;color:#a78bfa;}
  .saving-tag{font-size:11px;color:#ff6b6b;background:#ff000011;border:1px solid #ff000033;padding:4px 10px;border-radius:3px;}
  .input-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  input{background:#100820;border:1px solid #a78bfa22;border-radius:4px;padding:8px 12px;color:#e8e0ff;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;}
  input:focus{border-color:#a78bfa;}
  select{background:#100820;border:1px solid #a78bfa22;border-radius:4px;padding:8px;color:#e8e0ff;font-family:'Rajdhani',sans-serif;font-size:13px;outline:none;}
  .btn{background:transparent;border:1px solid #a78bfa44;color:#a78bfa;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;padding:9px 16px;border-radius:4px;cursor:pointer;transition:all .2s;}
  .btn:hover{background:#a78bfa11;border-color:#a78bfa;}
  .person-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#100820;border:1px solid #a78bfa11;border-radius:4px;margin-bottom:8px;}
  .person-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#0a0618;}
  .person-name{flex:1;font-size:14px;color:#d4c8ff;}
  .person-share{font-family:'Share Tech Mono',monospace;font-size:14px;color:#a78bfa;}
  .section{display:none;}
  .section.active{display:block;}
  .waste-badge{background:#ff000011;border:1px solid #ff000033;color:#ff8888;font-size:11px;padding:3px 8px;border-radius:3px;margin-left:8px;}
</style>
</head>
<body>
<h1>FinanceOS</h1>
<p class="subtitle">Subscription Auditor ┬╖ Bill Splitter</p>
<div class="tabs">
  <div class="tab active" onclick="switchTab('subs',this)">SUBSCRIPTIONS</div>
  <div class="tab" onclick="switchTab('split',this)">BILL SPLITTER</div>
</div>

<div id="subs" class="section active">
  <div class="total-bar">
    <div><div class="total-label">MONTHLY BURN</div><div class="total-val" id="monthlyTotal">$0</div></div>
    <div style="text-align:right;"><div class="total-label">ANNUAL</div><div class="total-val" id="annualTotal" style="font-size:16px;color:#8877cc;">$0</div></div>
    <span class="saving-tag" id="wasteTag">+0 unused</span>
  </div>
  <div id="subList"></div>
  <div class="panel">
    <div class="panel-title">Add Subscription</div>
    <div class="input-row">
      <input id="subName" placeholder="Name (e.g. Netflix)" style="flex:1;min-width:120px;">
      <input id="subCost" placeholder="Cost $" type="number" style="width:90px;">
      <select id="subFreq"><option value="monthly">Monthly</option><option value="annual">Annual</option></select>
      <div class="btn" onclick="addSub()">+ ADD</div>
    </div>
  </div>
</div>

<div id="split" class="section">
  <div class="panel">
    <div class="panel-title">Bill Details</div>
    <div class="input-row">
      <input id="billAmt" placeholder="Total bill $" type="number" style="width:140px;">
      <input id="billDesc" placeholder="Description" style="flex:1;">
    </div>
    <div class="input-row">
      <input id="personName" placeholder="Add person" style="flex:1;">
      <div class="btn" onclick="addPerson()">+ PERSON</div>
    </div>
  </div>
  <div id="personList"></div>
  <div class="total-bar" id="splitResult" style="display:none;">
    <div><div class="total-label">EACH PERSON PAYS</div><div class="total-val" id="perPersonAmt">$0</div></div>
    <div style="text-align:right;"><div class="total-label">TOTAL</div><div class="total-val" id="splitTotal" style="font-size:16px;color:#8877cc;">$0</div></div>
  </div>
</div>

<script>
const subs=[];
const colors=['#a78bfa','#7c3aed','#6d28d9','#8b5cf6','#c4b5fd'];
const icons=['ЁЯОм','ЁЯО╡','ЁЯОо','тШБя╕П','ЁЯУ░','ЁЯОи','ЁЯТк','ЁЯУЪ','ЁЯЫТ','ЁЯУб'];

function addSub(){
  const name=document.getElementById('subName').value.trim();
  const cost=parseFloat(document.getElementById('subCost').value)||0;
  const freq=document.getElementById('subFreq').value;
  if(!name||!cost)return;
  const monthly=freq==='annual'?cost/12:cost;
  subs.push({name,cost,freq,monthly,used:true,icon:icons[Math.floor(Math.random()*icons.length)],color:colors[Math.floor(Math.random()*colors.length)]});
  document.getElementById('subName').value='';
  document.getElementById('subCost').value='';
  renderSubs();
}

function toggleUsed(idx){
  subs[idx].used=!subs[idx].used;
  renderSubs();
}
function delSub(idx){subs.splice(idx,1);renderSubs();}

function renderSubs(){
  const list=document.getElementById('subList');
  list.innerHTML=subs.map((s,i)=>`
    <div class="sub-item" style="${!s.used?'opacity:.5':''}">
      <div class="sub-icon" style="background:${s.color}22;border:1px solid ${s.color}44;">${s.icon}</div>
      <div style="flex:1"><div class="sub-name">${s.name}${!s.used?'<span class="waste-badge">UNUSED</span>':''}</div><span class="sub-freq">${s.freq}</span></div>
      <div class="sub-cost">$${s.cost.toFixed(2)}</div>
      <button class="btn" style="padding:5px 10px;font-size:10px;margin-left:6px;" onclick="toggleUsed(${i})">${s.used?'MARK UNUSED':'RESTORE'}</button>
      <button class="sub-del" onclick="delSub(${i})">├Ч</button>
    </div>`).join('');
  const total=subs.reduce((a,s)=>a+s.monthly,0);
  const unused=subs.filter(s=>!s.used).length;
  document.getElementById('monthlyTotal').textContent='$'+total.toFixed(2);
  document.getElementById('annualTotal').textContent='$'+(total*12).toFixed(2);
  document.getElementById('wasteTag').textContent='+'+unused+' unused';
}

const people=[];
const avatarColors=['#a78bfa','#7c3aed','#06b6d4','#10b981','#f59e0b'];

function addPerson(){
  const name=document.getElementById('personName').value.trim();
  if(!name)return;
  people.push({name,color:avatarColors[people.length%avatarColors.length]});
  document.getElementById('personName').value='';
  renderPeople();
}

function renderPeople(){
  const list=document.getElementById('personList');
  const bill=parseFloat(document.getElementById('billAmt').value)||0;
  const share=people.length?bill/people.length:0;
  list.innerHTML=people.map((p,i)=>`
    <div class="person-row">
      <div class="person-avatar" style="background:${p.color};">${p.name[0].toUpperCase()}</div>
      <div class="person-name">${p.name}</div>
      <div class="person-share">$${share.toFixed(2)}</div>
      <button class="sub-del" onclick="people.splice(${i},1);renderPeople()">├Ч</button>
    </div>`).join('');
  if(people.length&&bill){
    document.getElementById('splitResult').style.display='flex';
    document.getElementById('perPersonAmt').textContent='$'+share.toFixed(2);
    document.getElementById('splitTotal').textContent='$'+bill.toFixed(2);
  } else {
    document.getElementById('splitResult').style.display='none';
  }
}

document.getElementById('billAmt').addEventListener('input',renderPeople);

function switchTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

// seed data
document.getElementById('subName').value='Netflix';
document.getElementById('subCost').value='15.99';
addSub();
document.getElementById('subName').value='Spotify';
document.getElementById('subCost').value='9.99';
addSub();
document.getElementById('subName').value='ChatGPT Plus';
document.getElementById('subCost').value='20.00';
addSub();
subs[1].used=false;
renderSubs();
</script>
</body>
</html>
