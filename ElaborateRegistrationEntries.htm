<!DOCTYPE html>
<html>
<head>
    <title>Elaborate your registration form entries</title>
</head>
<body>
    <h1>Details of users</h1>

    <form>
        <fieldset>
            <legend>Personal Information:</legend>

            <label>First name:</label>
            <input type="text" id="fname" name="fname"><br><br>

            <label>Last name:</label>
            <input type="text" id="lname" name="lname"><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="subject" value="Male"> Male<br>
            <input type="radio" name="subject" value="Female"> Female<br>
            <input type="radio" name="subject" value="Other"> Other<br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>

            <label for="birthday">Birthday:</label>
            <input type="date" id="birthday" name="birthday"><br><br>

            <label for="address">Address:</label><br>
            <textarea rows="5" cols="50" name="description">Enter description here...</textarea><br><br>

            <label for="image">Image:</label><br>
            <input type="file" name="fileupload" accept="image/*"><br><br>

            <center>
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </center>
        </fieldset>
    </form>
</body>
</html>
