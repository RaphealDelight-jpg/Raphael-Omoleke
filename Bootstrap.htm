<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Grids using bootstrap</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <style>
    .col-sm-1 {
      text-align: center;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <center>
  <h1>Grids using bootstrap</h1>
  <img src=" BootstrapLogo.png" alt="BootstrapLogo" width="200" height="200">  
  <div class="container">
    <div class="row">
      <div class="col-sm-1">
        One of three columns
      </div>
      <div class="col-sm-1">
        two of three columns
      </div>
      <div class="col-sm-1">
        three of three columns
      </div>
    </div>
  </div>
  </center>
</body>
</html>
