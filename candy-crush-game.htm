<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Crush</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --bg1: #1a0533;
    --bg2: #2d0a52;
    --candy-size: min(60px, 11vw);
    --gap: 3px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #1a0533 0%, #2d0a52 50%, #0a1a33 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  /* Stars background */
  #stars {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%,100%{opacity:0.2; transform:scale(1)}
    50%{opacity:1; transform:scale(1.3)}
  }

  header {
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Lilita One', cursive;
    font-size: 1.5rem;
    background: linear-gradient(135deg, #ff6ec7, #ffd700, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 2px 6px rgba(255,110,199,0.5));
  }

  .hud {
    display: flex;
    gap: 10px;
  }

  .hud-box {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 4px 14px;
    text-align: center;
    min-width: 70px;
  }

  .hud-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.6); }
  .hud-value { font-family: 'Lilita One', cursive; font-size: 1.2rem; color: #ffd700; }

  #main {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 520px;
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Level + objectives bar */
  .obj-bar {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 8px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .obj-bar .level-tag {
    font-family: 'Lilita One', cursive;
    font-size: 1rem;
    color: #ff6ec7;
  }

  .objectives {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .obj-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
  }

  .obj-candy {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  /* Moves bar */
  .moves-bar {
    width: 100%;
    text-align: center;
    margin-bottom: 8px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
  }

  .moves-bar span {
    font-family: 'Lilita One', cursive;
    font-size: 1.1rem;
    color: #ff6ec7;
  }

  /* Score bar */
  .score-progress {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6ec7, #ffd700);
    border-radius: 4px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  /* Board */
  #board {
    display: grid;
    gap: var(--gap);
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    position: relative;
    touch-action: none;
  }

  .cell {
    width: var(--candy-size);
    height: var(--candy-size);
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.12s, filter 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--candy-size) * 0.55);
    position: relative;
    overflow: visible;
  }

  .cell:hover { transform: scale(1.08); filter: brightness(1.15); }
  .cell.selected { transform: scale(1.12); filter: brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,0.8)); }
  .cell.matched { animation: pop 0.3s ease forwards; }
  .cell.falling { animation: fall 0.25s ease-out; }
  .cell.hint { animation: pulse-hint 0.6s ease-in-out 3; }
  .cell.special { animation: spin-glow 2s linear infinite; }

  @keyframes pop {
    0%{transform:scale(1.2);opacity:1}
    50%{transform:scale(1.5);opacity:0.5}
    100%{transform:scale(0);opacity:0}
  }

  @keyframes fall {
    0%{transform:translateY(-30px);opacity:0}
    100%{transform:translateY(0);opacity:1}
  }

  @keyframes pulse-hint {
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.15);filter:brightness(1.4)}
  }

  @keyframes spin-glow {
    0%{filter:drop-shadow(0 0 6px gold)}
    50%{filter:drop-shadow(0 0 12px gold) brightness(1.2)}
    100%{filter:drop-shadow(0 0 6px gold)}
  }

  /* Candy types */
  .c0 { background: radial-gradient(circle at 35% 35%, #ff8a8a, #cc0000); } /* red */
  .c1 { background: radial-gradient(circle at 35% 35%, #82b1ff, #1565c0); } /* blue */
  .c2 { background: radial-gradient(circle at 35% 35%, #a5d6a7, #2e7d32); } /* green */
  .c3 { background: radial-gradient(circle at 35% 35%, #ffe082, #f57f17); } /* yellow */
  .c4 { background: radial-gradient(circle at 35% 35%, #f48fb1, #880e4f); } /* pink */
  .c5 { background: radial-gradient(circle at 35% 35%, #ce93d8, #6a1b9a); } /* purple */
  .c6 { background: radial-gradient(circle at 35% 35%, #80cbc4, #004d40); } /* teal */
  .c7 { background: radial-gradient(circle at 35% 35%, #ffcc80, #bf360c); } /* orange */

  /* Candy shapes / patterns */
  .c0::after,.c1::after,.c2::after,.c3::after,.c4::after,.c5::after,.c6::after,.c7::after {
    content:'';
    position:absolute;
    top: 18%; left: 18%;
    width: 30%; height: 30%;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }

  /* Special candies */
  .striped-h::before { content:''; position:absolute; inset:25% 0; background:rgba(255,255,255,0.4); }
  .striped-v::before { content:''; position:absolute; top:0; bottom:0; left:25%; right:25%; background:rgba(255,255,255,0.4); }
  .wrapped { border: 3px solid rgba(255,255,255,0.7); border-radius: 8px; }
  .bomb { border-radius: 50% !important; animation: bomb-pulse 1s ease-in-out infinite !important; }

  @keyframes bomb-pulse {
    0%,100%{box-shadow:0 0 8px 4px rgba(255,165,0,0.6)}
    50%{box-shadow:0 0 16px 8px rgba(255,50,0,0.8)}
  }

  /* Candy emojis overlay */
  .candy-emoji {
    position:absolute;
    font-size: calc(var(--candy-size) * 0.5);
    pointer-events:none;
    z-index:2;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    justify-content: center;
  }

  .btn {
    padding: 9px 20px;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-candy {
    background: linear-gradient(135deg, #ff6ec7, #ff3d9a);
    color: white;
    box-shadow: 0 4px 12px rgba(255,61,154,0.4);
  }

  .btn-candy:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,61,154,0.5); }

  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* Overlays */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: linear-gradient(160deg, #2d0a52, #1a0533);
    border: 2px solid rgba(255,110,199,0.4);
    border-radius: 28px;
    padding: 36px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,110,199,0.15);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, rgba(255,215,0,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  @keyframes popIn {
    from{transform:scale(0.7);opacity:0}
    to{transform:scale(1);opacity:1}
  }

  .modal-icon { font-size: 4rem; margin-bottom: 10px; }
  .modal h2 { font-family:'Lilita One',cursive; font-size:2rem; margin-bottom:8px; }
  .modal p { opacity:0.7; margin-bottom:20px; font-size:0.9rem; }

  .stars-display { font-size: 2rem; letter-spacing: 6px; margin: 8px 0 16px; }

  /* Combo flash */
  .combo-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Lilita One', cursive;
    font-size: 3rem;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 4px 8px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 300;
    animation: combo-anim 1s ease-out forwards;
  }

  @keyframes combo-anim {
    0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}
    30%{transform:translate(-50%,-60%) scale(1.2)}
    100%{opacity:0;transform:translate(-50%,-90%) scale(0.9)}
  }

  /* Score popup */
  .score-popup {
    position: fixed;
    font-family: 'Lilita One', cursive;
    font-size: 1.4rem;
    color: #ffd700;
    pointer-events: none;
    z-index: 300;
    animation: score-float 1.2s ease-out forwards;
  }

  @keyframes score-float {
    0%{opacity:1;transform:translateY(0)}
    100%{opacity:0;transform:translateY(-60px)}
  }

  /* Confetti */
  .conf {
    position: fixed;
    width: 8px; height: 12px;
    pointer-events: none;
    z-index: 200;
    animation: conf-fall var(--dur,2s) linear forwards;
    border-radius: 2px;
  }

  @keyframes conf-fall {
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0}
  }
</style>
</head>
<body>

<div id="stars"></div>

<header>
  <div class="logo">🍬 Candy Crush</div>
  <div class="hud">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="hud-level">1</div>
    </div>
  </div>
</header>

<div id="main">
  <div class="obj-bar">
    <div class="level-tag" id="level-tag">Level 1</div>
    <div class="objectives" id="objectives"></div>
  </div>

  <div class="moves-bar">Moves left: <span id="moves-left">0</span></div>
  <div class="score-progress"><div class="score-fill" id="score-fill" style="width:0%"></div></div>

  <div id="board"></div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="hint-btn">💡 Hint</button>
    <button class="btn btn-secondary" id="restart-btn">↺ Restart</button>
    <button class="btn btn-candy" id="shuffle-btn">🔀 Shuffle</button>
  </div>
</div>

<!-- Win overlay -->
<div class="overlay" id="win-overlay">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <h2 style="color:#ffd700">Level Complete!</h2>
    <div class="stars-display" id="win-stars">⭐⭐⭐</div>
    <p id="win-msg">Amazing! You crushed it!</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-candy" id="win-next">Next Level →</button>
    </div>
  </div>
</div>

<!-- Lose overlay -->
<div class="overlay" id="lose-overlay">
  <div class="modal">
    <div class="modal-icon">💔</div>
    <h2 style="color:#ff3d9a">No More Moves!</h2>
    <p id="lose-msg">You ran out of moves. Try again!</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-secondary" id="lose-retry">↺ Retry</button>
      <button class="btn btn-candy" id="lose-next">Skip Level →</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CANDY_EMOJIS = ['🍎','🫐','🍀','🌟','🩷','🔮','🧊','🍊'];
const CANDY_COLORS = 8; // max candy types

// Board size increases with level
function getBoardSize(lvl) {
  if (lvl <= 3) return 6;
  if (lvl <= 8) return 7;
  if (lvl <= 15) return 8;
  return Math.min(9, Math.floor(7 + lvl / 10));
}

function getNumColors(lvl) {
  return Math.min(CANDY_COLORS, 4 + Math.floor(lvl / 3));
}

function getLevelMoves(lvl) {
  return Math.max(12, 30 - Math.floor(lvl * 0.8));
}

function getLevelTarget(lvl) {
  return 500 + lvl * 300 + Math.pow(lvl, 1.5) * 50 | 0;
}

// ============================================================
// GAME STATE
// ============================================================
let G = {
  level: 1,
  board: [],    // [row][col] = {type, special} or null
  size: 8,
  numColors: 5,
  score: 0,
  moves: 0,
  maxMoves: 20,
  target: 1000,
  selected: null,
  animating: false,
  combo: 0,
  objectives: {},    // {type: {target, current}}
  hintTimer: null,
};

// ============================================================
// SPECIAL CANDY TYPES
// ============================================================
// special: null | 'striped_h' | 'striped_v' | 'wrapped' | 'bomb'

function makeCandy(type, special=null) {
  return { type, special };
}

// ============================================================
// BOARD INIT
// ============================================================
function initBoard() {
  const s = G.size;
  do {
    G.board = [];
    for (let r = 0; r < s; r++) {
      G.board[r] = [];
      for (let c = 0; c < s; c++) {
        let type;
        do {
          type = Math.floor(Math.random() * G.numColors);
        } while (
          (c >= 2 && G.board[r][c-1]?.type === type && G.board[r][c-2]?.type === type) ||
          (r >= 2 && G.board[r-1][c]?.type === type && G.board[r-2][c]?.type === type)
        );
        G.board[r][c] = makeCandy(type);
      }
    }
  } while (!hasValidMove());
}

// ============================================================
// RENDER
// ============================================================
function renderBoard() {
  const boardEl = document.getElementById('board');
  const s = G.size;
  boardEl.style.gridTemplateColumns = `repeat(${s}, var(--candy-size))`;

  boardEl.innerHTML = '';
  for (let r = 0; r < s; r++) {
    for (let c = 0; c < s; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      const candy = G.board[r][c];
      if (candy) {
        cell.classList.add(`c${candy.type}`);
        if (candy.special === 'striped_h') cell.classList.add('striped-h');
        if (candy.special === 'striped_v') cell.classList.add('striped-v');
        if (candy.special === 'wrapped') cell.classList.add('wrapped');
        if (candy.special === 'bomb') { cell.classList.add('bomb'); cell.style.borderRadius='50%'; }

        // Emoji on candy
        const emo = document.createElement('span');
        emo.className = 'candy-emoji';
        if (candy.special === 'bomb') emo.textContent = '💣';
        else if (candy.special) emo.textContent = '✨';
        else emo.textContent = '';
        cell.appendChild(emo);

        if (G.selected && G.selected[0] === r && G.selected[1] === c) {
          cell.classList.add('selected');
        }
      }

      cell.addEventListener('click', () => onCellClick(r, c));
      // Touch drag
      cell.addEventListener('touchstart', onTouchStart, { passive:true });
      cell.addEventListener('touchmove', onTouchMove, { passive:false });
      cell.addEventListener('touchend', onTouchEnd);

      boardEl.appendChild(cell);
    }
  }

  updateHUD();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = G.score.toLocaleString();
  document.getElementById('hud-level').textContent = G.level;
  document.getElementById('moves-left').textContent = G.moves;
  document.getElementById('level-tag').textContent = `Level ${G.level}`;

  const pct = Math.min(100, (G.score / G.target) * 100);
  document.getElementById('score-fill').style.width = pct + '%';

  renderObjectives();
}

function renderObjectives() {
  const el = document.getElementById('objectives');
  el.innerHTML = '';
  Object.entries(G.objectives).forEach(([type, obj]) => {
    const item = document.createElement('div');
    item.className = 'obj-item';
    const dot = document.createElement('div');
    dot.className = `obj-candy c${type}`;
    dot.textContent = CANDY_EMOJIS[type] || '?';
    const count = document.createElement('span');
    const remaining = Math.max(0, obj.target - obj.current);
    count.textContent = remaining;
    count.style.color = remaining === 0 ? '#69f0ae' : '#fff';
    item.appendChild(dot);
    item.appendChild(count);
    el.appendChild(item);
  });
}

// ============================================================
// INPUT HANDLING
// ============================================================
let touchStart = null;

function onTouchStart(e) {
  const cell = e.currentTarget;
  touchStart = { r: +cell.dataset.r, c: +cell.dataset.c, x: e.touches[0].clientX, y: e.touches[0].clientY };
}

function onTouchMove(e) {
  e.preventDefault();
}

function onTouchEnd(e) {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (absDx < 10 && absDy < 10) {
    onCellClick(touchStart.r, touchStart.c);
  } else {
    let tr = touchStart.r, tc = touchStart.c;
    if (absDx > absDy) { tc += dx > 0 ? 1 : -1; }
    else { tr += dy > 0 ? 1 : -1; }
    trySwap(touchStart.r, touchStart.c, tr, tc);
    G.selected = null;
  }
  touchStart = null;
}

function onCellClick(r, c) {
  if (G.animating || G.moves <= 0) return;
  clearHint();

  if (!G.selected) {
    G.selected = [r, c];
    renderBoard();
    return;
  }

  const [sr, sc] = G.selected;
  if (sr === r && sc === c) {
    G.selected = null;
    renderBoard();
    return;
  }

  // Adjacent?
  const dr = Math.abs(r - sr), dc = Math.abs(c - sc);
  if (dr + dc === 1) {
    trySwap(sr, sc, r, c);
    G.selected = null;
  } else {
    G.selected = [r, c];
    renderBoard();
  }
}

// ============================================================
// SWAP & MATCH
// ============================================================
async function trySwap(r1, c1, r2, c2) {
  if (G.animating) return;
  if (!inBounds(r1,c1) || !inBounds(r2,c2)) return;

  // Swap
  swap(r1,c1,r2,c2);

  // Find matches
  let matches = findMatches();

  if (matches.length === 0) {
    // Invalid — swap back
    swap(r1,c1,r2,c2);
    G.selected = null;
    renderBoard();
    return;
  }

  G.moves--;
  G.animating = true;
  G.combo = 0;

  // Check special candy activations
  const c1candy = G.board[r1][c1];
  const c2candy = G.board[r2][c2];
  if (c1candy?.special || c2candy?.special) {
    activateSpecial(r1,c1,r2,c2,c1candy,c2candy,matches);
  }

  await processMatches();
  G.animating = false;
  G.selected = null;
  updateHUD();

  if (!hasValidMove()) await shuffleBoard();

  checkWin();
  checkLose();
}

function swap(r1,c1,r2,c2) {
  [G.board[r1][c1], G.board[r2][c2]] = [G.board[r2][c2], G.board[r1][c1]];
}

function inBounds(r,c) {
  return r >= 0 && r < G.size && c >= 0 && c < G.size;
}

// ============================================================
// MATCH FINDING
// ============================================================
function findMatches() {
  const s = G.size;
  const matched = new Set();

  // Horizontal
  for (let r = 0; r < s; r++) {
    let run = 1;
    for (let c = 1; c < s; c++) {
      if (G.board[r][c]?.type === G.board[r][c-1]?.type && G.board[r][c] !== null) {
        run++;
      } else {
        if (run >= 3) for (let k=c-run; k<c; k++) matched.add(`${r},${k}`);
        run = 1;
      }
    }
    if (run >= 3) for (let k=s-run; k<s; k++) matched.add(`${r},${k}`);
  }

  // Vertical
  for (let c = 0; c < s; c++) {
    let run = 1;
    for (let r = 1; r < s; r++) {
      if (G.board[r][c]?.type === G.board[r-1][c]?.type && G.board[r][c] !== null) {
        run++;
      } else {
        if (run >= 3) for (let k=r-run; k<r; k++) matched.add(`${k},${c}`);
        run = 1;
      }
    }
    if (run >= 3) for (let k=s-run; k<s; k++) matched.add(`${k},${c}`);
  }

  return [...matched].map(key => key.split(',').map(Number));
}

function countMatchLength(r,c,dr,dc) {
  const type = G.board[r][c]?.type;
  let count = 1;
  let nr=r+dr, nc=c+dc;
  while (inBounds(nr,nc) && G.board[nr][nc]?.type === type) { count++; nr+=dr; nc+=dc; }
  return count;
}

// ============================================================
// PROCESS MATCHES (cascade)
// ============================================================
async function processMatches() {
  let matches = findMatches();
  while (matches.length > 0) {
    G.combo++;
    const pts = matches.length * 30 * G.combo;
    G.score += pts;

    // Update objectives
    matches.forEach(([r,c]) => {
      const type = G.board[r][c]?.type;
      if (type !== undefined && G.objectives[type]) {
        G.objectives[type].current++;
      }
    });

    // Spawn specials on long matches
    spawnSpecials(matches);

    // Mark matched
    matches.forEach(([r,c]) => {
      const el = getCellEl(r,c);
      if (el) el.classList.add('matched');
      G.board[r][c] = null;
    });

    if (G.combo > 1) showCombo(G.combo);
    showScorePopup(pts);

    await delay(300);

    // Gravity
    applyGravity();
    fillBoard();
    renderBoard();
    await delay(250);

    matches = findMatches();
  }
}

function applyGravity() {
  const s = G.size;
  for (let c = 0; c < s; c++) {
    let empty = s - 1;
    for (let r = s - 1; r >= 0; r--) {
      if (G.board[r][c] !== null) {
        G.board[empty][c] = G.board[r][c];
        if (empty !== r) G.board[r][c] = null;
        empty--;
      }
    }
    // Fill nulls at top
    for (let r = empty; r >= 0; r--) {
      G.board[r][c] = null;
    }
  }
}

function fillBoard() {
  const s = G.size;
  for (let r = 0; r < s; r++) {
    for (let c = 0; c < s; c++) {
      if (G.board[r][c] === null) {
        G.board[r][c] = makeCandy(Math.floor(Math.random() * G.numColors));
      }
    }
  }
}

function spawnSpecials(matches) {
  // Find "run of 5+" → bomb, "4 in row" → striped, "L/T shape" → wrapped
  // Simple heuristic based on match count
  if (matches.length >= 9) {
    const [r,c] = matches[Math.floor(matches.length/2)];
    G.board[r][c] = makeCandy(G.board[r][c]?.type ?? 0, 'bomb');
  } else if (matches.length >= 6) {
    const [r,c] = matches[0];
    const special = Math.random() < 0.5 ? 'wrapped' : 'bomb';
    G.board[r][c] = makeCandy(G.board[r][c]?.type ?? 0, special);
  } else if (matches.length >= 4) {
    const [r,c] = matches[0];
    G.board[r][c] = makeCandy(G.board[r][c]?.type ?? 0, Math.random()<0.5?'striped_h':'striped_v');
  }
}

function activateSpecial(r1,c1,r2,c2,can1,can2,extraMatches) {
  // Bomb clears 3x3
  if (can1?.special === 'bomb') clearArea(r1,c1,3);
  if (can2?.special === 'bomb') clearArea(r2,c2,3);
  if (can1?.special === 'striped_h') clearRow(r1);
  if (can1?.special === 'striped_v') clearCol(c1);
  if (can2?.special === 'striped_h') clearRow(r2);
  if (can2?.special === 'striped_v') clearCol(c2);
}

function clearArea(r,c,size) {
  const half = Math.floor(size/2);
  for (let dr=-half; dr<=half; dr++)
    for (let dc=-half; dc<=half; dc++)
      if (inBounds(r+dr,c+dc)) G.board[r+dr][c+dc] = null;
}

function clearRow(r) {
  for (let c=0; c<G.size; c++) G.board[r][c] = null;
}

function clearCol(c) {
  for (let r=0; r<G.size; r++) G.board[r][c] = null;
}

// ============================================================
// VALID MOVE CHECK
// ============================================================
function hasValidMove() {
  const s = G.size;
  for (let r=0; r<s; r++) {
    for (let c=0; c<s; c++) {
      if (c+1 < s) { swap(r,c,r,c+1); if(findMatches().length>0){swap(r,c,r,c+1);return true;} swap(r,c,r,c+1); }
      if (r+1 < s) { swap(r,c,r+1,c); if(findMatches().length>0){swap(r,c,r+1,c);return true;} swap(r,c,r+1,c); }
    }
  }
  return false;
}

async function shuffleBoard() {
  showComboText('🔀 Reshuffling!');
  let attempts = 0;
  do {
    const flat = G.board.flat();
    for (let i=flat.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [flat[i],flat[j]] = [flat[j],flat[i]];
    }
    for (let r=0; r<G.size; r++)
      for (let c=0; c<G.size; c++)
        G.board[r][c] = flat[r*G.size+c];
    attempts++;
  } while (!hasValidMove() && attempts < 100);
  renderBoard();
  await delay(500);
}

// ============================================================
// HINT
// ============================================================
function showHint() {
  clearHint();
  const s = G.size;
  for (let r=0; r<s; r++) {
    for (let c=0; c<s; c++) {
      if (c+1 < s) {
        swap(r,c,r,c+1);
        if (findMatches().length > 0) {
          swap(r,c,r,c+1);
          highlightHint(r,c); highlightHint(r,c+1);
          return;
        }
        swap(r,c,r,c+1);
      }
      if (r+1 < s) {
        swap(r,c,r+1,c);
        if (findMatches().length > 0) {
          swap(r,c,r+1,c);
          highlightHint(r,c); highlightHint(r+1,c);
          return;
        }
        swap(r,c,r+1,c);
      }
    }
  }
}

function highlightHint(r,c) {
  const el = getCellEl(r,c);
  if (el) {
    el.classList.add('hint');
    G.hintTimer = setTimeout(() => el.classList.remove('hint'), 2000);
  }
}

function clearHint() {
  document.querySelectorAll('.hint').forEach(el => el.classList.remove('hint'));
}

// ============================================================
// WIN / LOSE
// ============================================================
function checkWin() {
  const objDone = Object.values(G.objectives).every(o => o.current >= o.target);
  const scoreDone = G.score >= G.target;
  if (objDone && scoreDone) {
    setTimeout(showWin, 400);
  }
}

function checkLose() {
  if (G.moves <= 0) {
    const objDone = Object.values(G.objectives).every(o => o.current >= o.target);
    const scoreDone = G.score >= G.target;
    if (!objDone || !scoreDone) {
      setTimeout(showLose, 400);
    }
  }
}

function showWin() {
  const stars = G.score >= G.target * 1.5 ? '⭐⭐⭐' : G.score >= G.target * 1.2 ? '⭐⭐' : '⭐';
  document.getElementById('win-stars').textContent = stars;
  document.getElementById('win-msg').textContent = `Score: ${G.score.toLocaleString()}  |  Moves left: ${G.moves}`;
  document.getElementById('win-overlay').classList.add('show');
  spawnConfetti();
}

function showLose() {
  document.getElementById('lose-msg').textContent = `Final score: ${G.score.toLocaleString()} / ${G.target.toLocaleString()} needed`;
  document.getElementById('lose-overlay').classList.add('show');
}

// ============================================================
// LEVEL LOAD
// ============================================================
function loadLevel(lvl) {
  G.level = lvl;
  G.size = getBoardSize(lvl);
  G.numColors = getNumColors(lvl);
  G.score = 0;
  G.moves = getLevelMoves(lvl);
  G.maxMoves = G.moves;
  G.target = getLevelTarget(lvl);
  G.selected = null;
  G.animating = false;
  G.combo = 0;

  // Objectives: collect N of 2 random candy types
  G.objectives = {};
  const types = Array.from({length:G.numColors},(_,i)=>i).sort(()=>Math.random()-0.5).slice(0,2);
  types.forEach(t => {
    G.objectives[t] = { target: 10 + lvl * 3, current: 0 };
  });

  initBoard();
  renderBoard();

  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('lose-overlay').classList.remove('show');
}

// ============================================================
// VISUAL EFFECTS
// ============================================================
function showCombo(n) {
  if (n < 2) return;
  const texts = ['','','Double!','Triple!','x4 Combo!','x5 MEGA!','x'+n+' INSANE!'];
  const text = texts[Math.min(n, texts.length-1)];
  showComboText(text);
}

function showComboText(text) {
  const el = document.createElement('div');
  el.className = 'combo-flash';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function showScorePopup(pts) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = '+' + pts;
  el.style.left = (30 + Math.random()*40) + '%';
  el.style.top = (40 + Math.random()*20) + '%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnConfetti() {
  const colors = ['#ff6ec7','#ffd700','#69f0ae','#82b1ff','#ff8a8a','#ce93d8'];
  for (let i=0; i<50; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    c.style.cssText = `
      left:${Math.random()*100}%;
      top:-20px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dur:${1.5+Math.random()*2}s;
      transform:rotate(${Math.random()*360}deg);
      animation-delay:${Math.random()*0.5}s;
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function getCellEl(r,c) {
  return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// ============================================================
// STARS BACKGROUND
// ============================================================
function initStars() {
  const container = document.getElementById('stars');
  for (let i=0; i<80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2.5+0.5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      animation-delay:${Math.random()*5}s;
    `;
    container.appendChild(s);
  }
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('hint-btn').onclick = showHint;
document.getElementById('restart-btn').onclick = () => loadLevel(G.level);
document.getElementById('shuffle-btn').onclick = async () => {
  if (!G.animating) { G.animating=true; await shuffleBoard(); G.animating=false; }
};
document.getElementById('win-next').onclick = () => loadLevel(G.level + 1);
document.getElementById('lose-retry').onclick = () => loadLevel(G.level);
document.getElementById('lose-next').onclick = () => loadLevel(G.level + 1);

// ============================================================
// INIT
// ============================================================
initStars();
loadLevel(1);
</script>
