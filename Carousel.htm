<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap Carousel Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .carousel-item img { object-fit: cover; height: 60vh; }
    .carousel-caption { background: rgba(0,0,0,0.45); padding: .75rem 1rem; border-radius: .375rem; }
    @media (max-width: 576px){ .carousel-item img { height: 40vh; } }
  </style>
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-4">Bootstrap Carousel</h1>

    <div id="demoCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-pause="hover" data-bs-interval="4000">

      <!-- Indicators -->
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#demoCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#demoCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#demoCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
      </div>

      <!-- Slides -->
      <div class="carousel-inner rounded shadow-sm">
        <div class="carousel-item active">
          <img src="https://picsum.photos/1200/600?random=201" class="d-block w-100" alt="Slide 1">
          <div class="carousel-caption d-none d-md-block">
            <h5>Elegant Collection</h5>
            <p>Discover our seasonal looks at EventReality Fashion.</p>
          </div>
        </div>

        <div class="carousel-item">
          <img src="https://picsum.photos/1200/600?random=202" class="d-block w-100" alt="Slide 2">
          <div class="carousel-caption d-none d-md-block">
            <h5>Runway Moments</h5>
            <p>Highlights from the latest shows and editorials.</p>
          </div>
        </div>

        <div class="carousel-item">
          <img src="https://picsum.photos/1200/600?random=203" class="d-block w-100" alt="Slide 3">
          <div class="carousel-caption d-none d-md-block">
            <h5>Behind The Scenes</h5>
            <p>Studio previews and exclusive backstage content.</p>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <button class="carousel-control-prev" type="button" data-bs-target="#demoCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#demoCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>

    </div>

    <div class="mt-4 text-center">
      <button id="startBtn" class="btn btn-sm btn-outline-primary me-2">Start</button>
      <button id="pauseBtn" class="btn btn-sm btn-outline-secondary">Pause</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const carouselEl = document.getElementById('demoCarousel');
    const carousel = new bootstrap.Carousel(carouselEl);
    document.getElementById('pauseBtn').addEventListener('click', () => carousel.pause());
    document.getElementById('startBtn').addEventListener('click', () => carousel.cycle());
  </script>
</body>
</html>
