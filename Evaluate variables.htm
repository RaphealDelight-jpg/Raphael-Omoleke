<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Evaluate Variables</h2>
    <p>Click the button to evaluate the variables and display their values.</p>
    <button onclick="evaluateVariables()">Evaluate Variables</button>
    <p id="output"></p>
    <script>
        var a = 10;
        var b = 20;
        var c = a + b;

        function evaluateVariables() {
            var result = "a: " + a + ", b: " + b + ", c: " + c;
            document.getElementById("output").innerHTML = result;
        }
    </script>
</body>
</html>
