<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elemental Burst: Sky Arena</title>
    <style>
        /* CSS STYLES */
        :root {
            --bg-color: #1a0b2e;
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --accent-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            overflow: hidden; /* Prevent scrolling */
            font-family: var(--ui-font);
            color: white;
            touch-action: none; /* Standard for mobile games */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2b1055 0%, #000000 100%);
        }

        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: pointer;
        }

        /* UI OVERLAY */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* MODALS (Start / Game Over) */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff9a9e, #fecfef);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 10px rgba(255, 105, 180, 0.5);
        }

        p.subtitle {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 30px;
            max-width: 400px;
            text-align: center;
        }

        button.btn-primary {
            background: linear-gradient(45deg, #FF512F, #DD2476);
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(221, 36, 118, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(221, 36, 118, 0.6);
        }

        button.btn-primary:active {
            transform: scale(0.95);
        }

        /* Floating Text Animation */
        .floating-text {
            position: absolute;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0px 0px 5px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="movesDisplay">20</div>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="startModal" class="modal">
        <h1>Elemental Burst</h1>
        <p class="subtitle">Drag to connect 3 or more gems of the same color.<br>Match 6+ for Bombs!</p>
        <button class="btn-primary" onclick="game.start()">Play Now</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverModal" class="modal hidden">
        <h1>Level Complete</h1>
        <p class="subtitle" id="finalScoreText">Score: 0</p>
        <button class="btn-primary" onclick="game.reset()">Play Again</button>
    </div>
</div>

<script>
/**
 * ELEMENTAL BURST: SKY ARENA
 * Single File Implementation
 */

// --- CONFIGURATION ---
const CONFIG = {
    cols: 6,
    rows: 8,
    blockSize: 60, // Base size, will scale
    matchMin: 3,
    bombThreshold: 6,
    colors: [
        { name: 'Fire', hex: '#FF4D4D', glow: '#FF0000' },
        { name: 'Water', hex: '#4D4DFF', glow: '#0000FF' },
        { name: 'Earth', hex: '#4DFF4D', glow: '#00FF00' },
        { name: 'Air', hex: '#FFFF4D', glow: '#FFFF00' },
        { name: 'Void', hex: '#FF4DFF', glow: '#FF00FF' }
    ],
    gravity: 0.8, // Lerp factor
    animSpeed: 0.2
};

// --- CLASSES ---

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 5 + 2;
        this.speedX = (Math.random() - 0.5) * 6;
        this.speedY = (Math.random() - 0.5) * 6;
        this.life = 1.0;
        this.decay = Math.random() * 0.03 + 0.02;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= this.decay;
        this.size *= 0.95;
    }

    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class Block {
    constructor(c, r, type) {
        this.c = c; // Grid Column
        this.r = r; // Grid Row
        this.type = type; // Color Index
        
        // Visual Position (x, y)
        this.x = c * CONFIG.blockSize;
        this.y = r * CONFIG.blockSize - (CONFIG.rows * CONFIG.blockSize); // Start above screen
        
        this.targetX = this.x;
        this.targetY = this.y;
        
        this.scale = 1;
        this.alpha = 1;
        this.isMatched = false;
        this.isBomb = false;
        this.selected = false; // Part of current chain
    }

    update() {
        // Smooth movement (Gravity)
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        
        if (Math.abs(dx) > 0.1) this.x += dx * CONFIG.gravity;
        else this.x = this.targetX;

        if (Math.abs(dy) > 0.1) this.y += dy * CONFIG.gravity;
        else this.y = this.targetY;

        // Selection animation
        const targetScale = this.selected ? 1.2 : 1.0;
        this.scale += (targetScale - this.scale) * 0.2;
    }

    draw(ctx) {
        const cx = this.x + CONFIG.blockSize / 2;
        const cy = this.y + CONFIG.blockSize / 2;
        const size = (CONFIG.blockSize / 2 - 4) * this.scale;

        const colorData = CONFIG.colors[this.type];
        
        // Glow effect
        ctx.shadowBlur = this.selected ? 20 : 10;
        ctx.shadowColor = colorData.glow;

        // Draw Base Shape
        ctx.fillStyle = colorData.hex;
        ctx.beginPath();
        if (this.isBomb) {
            // Draw Bomb Shape (Square with borders)
            ctx.rect(cx - size, cy - size, size * 2, size * 2);
        } else {
            // Draw Gem Shape (Circle)
            ctx.arc(cx, cy, size, 0, Math.PI * 2);
        }
        ctx.fill();

        // Inner Shine (Simulate 3D Gem)
        ctx.shadowBlur = 0; // Reset for internal details
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.beginPath();
        ctx.arc(cx - size * 0.3, cy - size * 0.3, size * 0.3, 0, Math.PI * 2);
        ctx.fill();

        // Bomb Icon
        if (this.isBomb) {
            ctx.fillStyle = "#FFF";
            ctx.font = `bold ${size}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("!", cx, cy);
        }
    }
}

class Game {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = 0;
        this.height = 0;
        
        this.grid = [];
        this.particles = [];
        this.selectedChain = []; // List of blocks currently being dragged
        
        this.score = 0;
        this.moves = 20;
        this.isPlaying = false;
        
        this.isDragging = false;
        this.lastMousePos = { x: 0, y: 0 };

        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        // Input Binding
        this.canvas.addEventListener('mousedown', (e) => this.handleStart(e));
        this.canvas.addEventListener('mousemove', (e) => this.handleMove(e));
        window.addEventListener('mouseup', () => this.handleEnd());
        
        this.canvas.addEventListener('touchstart', (e) => this.handleStart(e.touches[0]));
        this.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); this.handleMove(e.touches[0]); });
        window.addEventListener('touchend', () => this.handleEnd());

        // Game Loop
        requestAnimationFrame(() => this.loop());
    }

    resize() {
        // Make canvas fit container but maintain aspect ratio roughly
        const container = document.getElementById('game-container');
        this.width = Math.min(container.clientWidth, 500);
        this.height = Math.min(container.clientHeight, 800);
        
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        
        // Center grid
        this.offsetX = (this.width - (CONFIG.cols * CONFIG.blockSize)) / 2;
        this.offsetY = (this.height - (CONFIG.rows * CONFIG.blockSize)) / 2;
    }

    initGrid() {
        this.grid = [];
        for (let c = 0; c < CONFIG.cols; c++) {
            this.grid[c] = [];
            for (let r = 0; r < CONFIG.rows; r++) {
                // Random type
                const type = Math.floor(Math.random() * CONFIG.colors.length);
                const block = new Block(c, r, type);
                block.targetY = r * CONFIG.blockSize;
                block.x = c * CONFIG.blockSize; // Snap instantly for init
                this.grid[c][r] = block;
            }
        }
    }

    start() {
        document.getElementById('startModal').classList.add('hidden');
        document.getElementById('gameOverModal').classList.add('hidden');
        this.score = 0;
        this.moves = 20;
        this.updateUI();
        this.initGrid();
        this.isPlaying = true;
    }

    reset() {
        this.start();
    }

    getBlockAt(screenX, screenY) {
        // Convert screen coord to grid coord
        const gx = screenX - this.offsetX;
        const gy = screenY - this.offsetY;

        const c = Math.floor(gx / CONFIG.blockSize);
        const r = Math.floor(gy / CONFIG.blockSize);

        if (c >= 0 && c < CONFIG.cols && r >= 0 && r < CONFIG.rows) {
            return this.grid[c][r];
        }
        return null;
    }

    handleStart(e) {
        if (!this.isPlaying || this.moves <= 0) return;
        
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const block = this.getBlockAt(x, y);
        if (block && !block.isMatched) {
            this.isDragging = true;
            this.addToChain(block);
        }
    }

    handleMove(e) {
        if (!this.isDragging) return;

        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const block = this.getBlockAt(x, y);
        if (block && !block.isMatched) {
            // Logic: 
            // 1. If block is already in chain, backtrack (if it's the last one - 1)
            // 2. If block is new, check adjacency and color.
            
            const indexInChain = this.selectedChain.indexOf(block);
            
            if (indexInChain !== -1) {
                // Backtracking
                if (indexInChain === this.selectedChain.length - 2) {
                    // Undo last addition
                    const removed = this.selectedChain.pop();
                    removed.selected = false;
                }
            } else {
                // New block candidate
                const lastBlock = this.selectedChain[this.selectedChain.length - 1];
                const isAdjacent = Math.abs(block.c - lastBlock.c) <= 1 && Math.abs(block.r - lastBlock.r) <= 1;
                const isSameColor = block.type === lastBlock.type;

                if (isAdjacent && isSameColor) {
                    this.addToChain(block);
                }
            }
        }
    }

    addToChain(block) {
        block.selected = true;
        this.selectedChain.push(block);
        
        // Haptic feedback for mobile
        if (navigator.vibrate) navigator.vibrate(10);
    }

    handleEnd() {
        if (!this.isDragging) return;
        this.isDragging = false;

        if (this.selectedChain.length >= CONFIG.matchMin) {
            this.processMatch();
        } else {
            // Reset chain
            this.selectedChain.forEach(b => b.selected = false);
            this.selectedChain = [];
        }
    }

    processMatch() {
        // 1. Create Bomb if long enough
        if (this.selectedChain.length >= CONFIG.bombThreshold) {
            // Mark the last block as a bomb before it clears? 
            // Simplified: Just give bonus points for now
            this.showFloatingText("BOMB!", this.width/2, this.height/2);
        }

        // 2. Calculate Score
        const points = this.selectedChain.length * 10 * (this.selectedChain.length - 2);
        this.score += points;
        this.moves--;
        this.updateUI();

        // 3. Create Particles & Remove Blocks
        this.selectedChain.forEach(b => {
            this.spawnParticles(b.x + this.offsetX + CONFIG.blockSize/2, b.y + this.offsetY + CONFIG.blockSize/2, CONFIG.colors[b.type].hex);
            this.grid[b.c][b.r] = null; // Remove from grid logic
            b.isMatched = true; // Flag for cleanup if needed
            b.selected = false;
        });

        // Show floating text
        const centerBlock = this.selectedChain[Math.floor(this.selectedChain.length/2)];
        this.showFloatingText(`+${points}`, centerBlock.x + this.offsetX, centerBlock.y + this.offsetY);

        this.selectedChain = [];

        // 4. Trigger Gravity
        setTimeout(() => this.applyGravity(), 100);

        if (this.moves <= 0) {
            setTimeout(() => this.gameOver(), 1000);
        }
    }

    spawnParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            this.particles.push(new Particle(x, y, color));
        }
    }

    showFloatingText(text, x, y) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.getElementById('ui-layer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    applyGravity() {
        // Shift blocks down
        for (let c = 0; c < CONFIG.cols; c++) {
            let emptySlots = 0;
            for (let r = CONFIG.rows - 1; r >= 0; r--) {
                if (this.grid[c][r] === null) {
                    emptySlots++;
                } else if (emptySlots > 0) {
                    // Move block down
                    const block = this.grid[c][r];
                    block.r += emptySlots;
                    this.grid[c][r + emptySlots] = block;
                    this.grid[c][r] = null;
                    block.targetY = (r + emptySlots) * CONFIG.blockSize;
                }
            }

            // Spawn new blocks
            for (let r = 0; r < emptySlots; r++) {
                const type = Math.floor(Math.random() * CONFIG.colors.length);
                const block = new Block(c, r, type);
                // Start visual position above the grid
                block.y = -(emptySlots - r) * CONFIG.blockSize;
                this.grid[c][r] = block;
            }
        }
    }

    updateUI() {
        document.getElementById('scoreDisplay').innerText = this.score;
        document.getElementById('movesDisplay').innerText = this.moves;
    }

    gameOver() {
        this.isPlaying = false;
        document.getElementById('finalScoreText').innerText = `Final Score: ${this.score}`;
        document.getElementById('gameOverModal').classList.remove('hidden');
    }

    loop() {
        // Clear
        this.ctx.clearRect(0, 0, this.width, this.height);

        if (this.isPlaying) {
            // Draw Connections (Line)
            if (this.selectedChain.length > 0) {
                this.ctx.beginPath();
                this.ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
                this.ctx.lineWidth = 10;
                this.ctx.lineCap = "round";
                this.ctx.lineJoin = "round";
                
                const start = this.selectedChain[0];
                this.ctx.moveTo(start.x + this.offsetX + CONFIG.blockSize/2, start.y + this.offsetY + CONFIG.blockSize/2);
                
                for (let i = 1; i < this.selectedChain.length; i++) {
                    const b = this.selectedChain[i];
                    this.ctx.lineTo(b.x + this.offsetX + CONFIG.blockSize/2, b.y + this.offsetY + CONFIG.blockSize/2);
                }
                this.ctx.stroke();
            }

            // Apply offset for grid drawing
            this.ctx.save();
            this.ctx.translate(this.offsetX, this.offsetY);

            // Draw Blocks
            for (let c = 0; c < CONFIG.cols; c++) {
                for (let r = 0; r < CONFIG.rows; r++) {
                    if (this.grid[c][r]) {
                        this.grid[c][r].update();
                        this.grid[c][r].draw(this.ctx);
                    }
                }
            }
            this.ctx.restore();

            // Draw Particles (No offset, they use screen coords)
            for (let i = this.particles.length - 1; i >= 0; i--) {
                const p = this.particles[i];
                p.update();
                p.draw(this.ctx);
                if (p.life <= 0) this.particles.splice(i, 1);
            }
        }

        requestAnimationFrame(() => this.loop());
    }
}

// Start Game Instance
const game = new Game();

</script>
</body>
</html>
