<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Display Headings, small and dl</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <h1 class="display-1">Display 1 <small class="text-muted">Mark</small></h1>
  <h2 class="display-4">Display 4 <small class="text-muted">Code</small></h2>

  <p>This is normal text with <small class="text-muted">small inline text</small>.</p>
  <p class="small">This whole paragraph is small text.</p>

  <dl>
    <dt>Bootstrap</dt>
    <dd>A front-end toolkit for responsive design.</dd>
    <dt>Display Heading</dt>
    <dd>Large headings using .display classes.</dd>
    <dt>Small Text</dt>
    <dd>Use <small> or .small class for smaller text.</dd>
  </dl>

</body>
</html>
