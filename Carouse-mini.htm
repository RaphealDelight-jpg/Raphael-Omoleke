<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Carousel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.carousel-item img{height:40vh;object-fit:cover}</style>
</head>
<body>
  <div class="container py-4">
    <h4 class="mb-3">EventReality — Mini Carousel (very short)</h4>
    <div id="mini" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2500">
      <div class="carousel-inner rounded shadow-sm">
        <div class="carousel-item active"><img src="https://picsum.photos/800/400?random=11" class="d-block w-100" alt="Slide 1"></div>
        <div class="carousel-item"><img src="https://picsum.photos/800/400?random=12" class="d-block w-100" alt="Slide 2"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
