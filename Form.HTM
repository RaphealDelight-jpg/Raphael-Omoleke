<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=200, initial-scale=1.0">
    <title>Personal Detail Form</title>
</head>
<h1>personal detail form</h1>
<body>
<form>
    <label>name</label><br>
    <input type="text" id="name"><br><br>
    <label>Email</label><br>
    <input type="text" id="Email"><br><br>
    <label>Contact number (this will be hidden)</label><br>
    <input type="password" id="contact"><br><br>
    <label>Gender</label><br>
    <input type="radio" id="female" name="Gender" value="female">female<br>
    <input type="radio" id="male" name="Gender" value="male">male<br>
    <label>favourite city</label><br>
    <input type="checkbox" id="city" value="Lagos">Lagos<br><br>
    <input type="checkbox" id="city" value="Abuja">Abuja<br><br>
    <input type="submit">
</form>
</body>
</html>
