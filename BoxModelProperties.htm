<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Box Model Demo</title>
  <style>
    .box {
      width: 300px;
      height: 150px;
      background-color: #f9c74f; 
      padding: 20px;             
      border: 5px solid #f94144; 
      margin: 30px;              
      color: #000;
      font-family: Arial, sans-serif;
    }

    body {
      background-color:blue;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>CSS Box Model</h2>
    <p>This box shows how margin, border, padding, and content work together.</p>
  </div>
</body>
</html>
