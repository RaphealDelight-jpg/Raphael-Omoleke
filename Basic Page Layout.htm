<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basic Page Layout</title>
<style>
  /* reset / box‑sizing */
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto;           /* header / content / footer */
    grid-template-columns: 200px 1fr;            /* sidebar / main */
    min-height: 100vh;
  }

  header, footer {
    grid-column: 1 / -1;                         /* span both columns */
    background:#ccc;
    padding: 1rem;
    text-align:center;
  }

  #sidebar {
    background:#add8e6;                          /* light blue */
    padding:1rem;
  }

  #main {
    background:#ffc0cb;                          /* light pink */
    padding:1rem;
  }
</style>
</head>
<body>

<header id="header">
    <h1>Home</h1>
</header>

<nav id="sidebar">
    <ul>
        <li><a href="Basic Page Layout.htm">Home</a></li>
        <li><a href="About.htm">About</a></li>
        <li><a href="Services.htm">Services</a></li>
        <li><a href="Contact.htm">Contact</a></li>
    </ul>
</nav>

<main id="main">
    <h2>Welcome to Our Website</h2>
    <p>This is the home page. Navigate using the sidebar to explore our site.</p>
    <p>We offer various services and information. Check out our About, Services, and Contact pages.</p>
</main>

<footer id="footer">
    <p>&copy; 2026 My Website. All rights reserved.</p>
</footer>
</body>
</html>
